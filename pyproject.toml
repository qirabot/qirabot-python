[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qirabot"
version = "1.9.5"
description = "AI vision-driven GUI automation across browsers, mobile, desktop, and games"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Qirabot Team", email = "support@qirabot.com" }
]
keywords = ["qirabot", "automation", "ai", "vision", "gui", "rpa", "cross-platform", "sdk", "testing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "Pillow>=10.0",
    "click>=8.1",
    "rich>=13.0",
]

[project.scripts]
qirabot = "qirabot.cli.main:main"

[project.urls]
Homepage = "https://qirabot.com"
Documentation = "https://github.com/qirabot/qirabot-python#readme"
Repository = "https://github.com/qirabot/qirabot-python"
Issues = "https://github.com/qirabot/qirabot-python/issues"

[project.optional-dependencies]
browser = ["playwright>=1.40,<2.0"]
desktop = ["pyautogui>=0.9.54", "pyperclip>=1.8"]
appium = ["Appium-Python-Client>=4.0"]
# NOTE: Airtest pins numpy<2.0 and opencv-contrib-python 4.4-4.6; installing
# this extra into an env that already has numpy>=2 may downgrade or conflict.
# Prefer a dedicated virtualenv. We don't re-pin those here — Airtest declares them.
# facebook-wda 1.5.4 removed USBClient's wda_bundle_id parameter, which every
# Airtest release still passes (core/ios/ios.py). Airtest <1.4 only requires
# facebook-wda>=1.3.3, so on non-Windows (where resolvers fall back to Airtest
# 1.3.x because 1.4.x needs pywin32 unconditionally) the broken combo resolves
# by default and iOS connect dies with a TypeError. Cap it until Airtest adapts.
airtest = ["airtest>=1.3.0", "facebook-wda<1.5.4"]
agent = ["uvicorn>=0.30", "starlette>=0.37"]
cli = []  # CLI now ships in the core package; kept as a no-op for backward compatibility
all = ["qirabot[browser,desktop,appium,airtest]"]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "playwright: Playwright browser tests",
    "selenium: Selenium browser tests",
    "desktop: Desktop pyautogui tests",
    "appium: Appium mobile tests",
    "airtest: Airtest device tests",
]

[tool.coverage.run]
source = ["qirabot"]

[tool.mypy]
python_version = "3.10"
strict = true

# The lint job installs the browser extra so the Playwright adapter + client get
# real type-checking. The other backends (desktop/mobile/selenium) stay out of
# CI — their stubs are poor/untyped and would only add noise — so their lazily
# imported modules are ignored here.
[[tool.mypy.overrides]]
module = [
    "selenium.*",
    "appium.*",
    "pyautogui",
    "pyperclip",
    "airtest.*",
    "wda",
    "cv2",
    "numpy",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py310"
line-length = 100
