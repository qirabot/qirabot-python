name: Docs Deploy (S3)

# Builds the VitePress docs site and syncs it to the website S3 bucket under
# the docs/ prefix, served at qirabot.com/docs behind CloudFront. The
# marketing site's own deploy (qirabot-v2 website-deploy.yml -> deploy-s3.sh)
# excludes docs/* from its --delete, so the two deploys never collide.
# Directory URLs (/docs/, /docs/guide/) resolve via the
# qirabot-website-dir-index CloudFront function.

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      WEBSITE_BUCKET: qira-527432981953-website-prod
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build
        working-directory: docs
        run: |
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Hashed assets get a year of immutable cache; HTML + sitemap must
      # revalidate so new deploys are picked up immediately.
      - name: Sync to S3 (docs/ prefix)
        working-directory: docs
        run: |
          aws s3 sync .vitepress/dist/ "s3://$WEBSITE_BUCKET/docs" --delete \
            --exclude "*.html" \
            --exclude sitemap.xml \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync .vitepress/dist/ "s3://$WEBSITE_BUCKET/docs" \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, must-revalidate"
          aws s3 cp .vitepress/dist/sitemap.xml "s3://$WEBSITE_BUCKET/docs/sitemap.xml" \
            --cache-control "public, max-age=3600" \
            --content-type "application/xml; charset=utf-8"

      # Set repo variable WEBSITE_CLOUDFRONT_ID (Settings > Variables) to enable.
      - name: Invalidate CloudFront
        if: ${{ vars.WEBSITE_CLOUDFRONT_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.WEBSITE_CLOUDFRONT_ID }}" --paths "/docs/*"
