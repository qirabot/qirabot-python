name: CI

on:
  push:
    branches: [main, 1.x]
  pull_request:
    branches: [main, 1.x]
  # Reusable: the publish workflow runs this same lint+test suite as its
  # release gate, so the two can't drift apart.
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev,browser]"
      - run: ruff check .
      - run: mypy src/qirabot/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 2.x has no numpy/opencv pins anywhere, so the matrix can track new
        # Python releases freely (the 1.x branch stays capped at 3.12).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov=qirabot
