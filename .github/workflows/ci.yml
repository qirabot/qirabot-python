name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Reusable: the publish workflow runs this same lint+test suite as its
  # release gate, so the two can't drift apart.
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev,browser]"
      - run: ruff check .
      - run: mypy src/qirabot/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,cli]"
      - run: pytest --cov=qirabot
